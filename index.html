<html>
  <head>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"
    />
    <title>Cuer</title>
    <link rel="stylesheet" href="style.css" />
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/jsdiff/8.0.2/diff.min.js"
      integrity="sha512-8pp155siHVmN5FYcqWNSFYn8Efr61/7mfg/F15auw8MCL3kvINbNT7gT8LldYPq3i/GkSADZd4IcUXPBoPP8gA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
  </head>
  <body>
    <div id="file-intro">
      <p id="upload-intro">
        To get started, please upload a text file formatted with
        <a href="https://fountain.io/">Fountain</a>.
      </p>
      <input
        type="file"
        id="file-input"
        accept=".txt,.fountain"
        onchange="onFileUpload(event)"
      />
    </div>
    <div id="character-selector">
      <p>Please select your character(s):</p>
      <div class="options"></div>
      <button id="submit-characters">Submit</button>
    </div>
    <div id="cuer">
      <div class="topish">
        <div id="top-top">
          <h1>Cuer</h1>
          <p>Character(s): <b id="character-names"></b></p>
          <p>Scene: <b id="current-scene"></b></p>
        </div>
        <div id="top-box">
          <div id="cues" class="dia-box"></div>
        </div>
        <div id="middle-section"></div>
        <div id="bottom-box">
          <div id="line" class="dia-box"></div>
        </div>
      </div>
      <div id="action-section">
        <div id="top-action">
        <button onclick="guessLine()" id="guess-btn">Guess</button>
        <button onclick="revealDialog()" id="reveal-line-btn">
          Reveal Line
        </button>
        <button onclick="revealWord()" id="reveal-word-btn">Reveal Word</button>

        <button id="next-btn" onclick="next()" class="showing">Next</button>
</div>
<div id="btm-action">
        <button onclick="prevScene()" id="skip-back-btn"><<</button>
        <button onclick="prevCue()" id="prev-btn"><</button>
        <button onclick="randomCue()" id="random-btn">🎲</button>
        <button id="forward-button" onclick="next()">></button>
        <button id="skip-frwd-button" onclick="nextScene()">>></button>
        </div>
      </div>

      <div id="bottom-bottom">
        <div>
          <button id="clear-script" class="showing" onclick="clearScript()">
            Clear Script
          </button>
          <button
            id="clear-characters"
            class="showing"
            onclick="clearCharacterSelections()"
          >
            Clear Character Selections
          </button>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
